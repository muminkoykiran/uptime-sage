name: CI

on:
  push:
    branches: [develop, 'feature/**', 'hotfix/**', 'release/**']
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Syntax & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          for f in src/*.js scripts/*.js .codex/hook-scripts/*.js .agents/skills/uptime-monitor/scripts/*.js; do
            [ -f "$f" ] && node --check "$f" && echo "OK: $f"
          done

      - name: Security audit
        run: npm audit --audit-level=high
